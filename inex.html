<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notepad</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        background-color: #313131;
        color: whitesmoke;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      }
      .main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      textarea {
        padding: 10px;
        width: 600px;
        height: 600px;
        background-color: #313131;
        color: white;
        font-family: serif;
        font-size: 36px;
        border-radius: 10px;
      }
      h1 {
        margin-bottom: 10px;
      }
      .count-sec {
        font-family: Arial, Helvetica, sans-serif;
        padding: 6px;
        width: 32%;
        text-align: end;
      }
      button {
        background-color: #313131;
        color: whitesmoke;
        border: none;
        border: 2px solid rgb(251, 251, 251);
        padding: 3px 16px 3px 16px;
        border-radius: 4px;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      }
      .notesselection{
        display: flex;
        padding: 10px;
border: 2px solid red;
    }
      .notes1{
        width: 400px;
        border: 2px solid blue;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h1>Notepad</h1>
      <textarea name="" id="" placeholder=""></textarea>
      <div class="count-sec">
        <h4>Character's : <span>0</span></h4>
      </div>
      <div>
        <button>Save</button>
        <button>add new Note</button>
        <button>Reset</button>
        <button>Save in PC</button>
      </div>
    </div>

    <!-- notes -->
     <div class="notesselection">
<div class="notes1">
    <h3>Notes</h3>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Repudiandae libero aperiam quod quae obcaecati dolore, aliquam porro veritatis fuga mollitia laboriosam repellat, illum debitis sunt autem iure vero eos amet.</p>
</div>
    </div>

    <script src="notepad.js"></script>
  </body>
</html>
